<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1e1e2e;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #cdd6f4;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    #header {
      padding: 14px 20px;
      border-bottom: 1px solid #313244;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    #header h1 {
      font-size: 15px;
      font-weight: 600;
    }

    #select-all-btn {
      background: none;
      border: none;
      color: #89b4fa;
      font-size: 12px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
    }

    #select-all-btn:hover {
      background: #313244;
    }

    #workspace-tree {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }

    .empty-state {
      color: #6c7086;
      text-align: center;
      padding: 60px 20px;
      font-size: 14px;
    }

    /* Window header */
    .window-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      cursor: pointer;
      user-select: none;
    }

    .window-header:hover {
      background: #181825;
    }

    .window-label {
      font-size: 13px;
      font-weight: 600;
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .window-badge {
      font-size: 11px;
      color: #6c7086;
      flex-shrink: 0;
    }

    .window-closed-tag {
      font-size: 10px;
      color: #f38ba8;
      background: rgba(243, 139, 168, 0.1);
      padding: 1px 6px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    .window-remove {
      background: none;
      border: none;
      color: #6c7086;
      font-size: 14px;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 3px;
      flex-shrink: 0;
      line-height: 1;
    }

    .window-remove:hover {
      color: #f38ba8;
      background: rgba(243, 139, 168, 0.1);
    }

    /* Group header */
    .group-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 16px 5px 44px;
      cursor: pointer;
      user-select: none;
    }

    .group-header:hover {
      background: #181825;
    }

    .group-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .group-title {
      font-size: 12px;
      font-weight: 600;
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .group-count {
      font-size: 11px;
      color: #6c7086;
      flex-shrink: 0;
    }

    /* Tab row */
    .tab-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 16px 4px 68px;
      cursor: pointer;
      user-select: none;
    }

    .tab-row.ungrouped {
      padding-left: 44px;
    }

    .tab-row:hover {
      background: #181825;
    }

    .tab-favicon {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      border-radius: 2px;
    }

    .tab-info {
      flex: 1;
      min-width: 0;
    }

    .tab-title {
      font-size: 12px;
      color: #cdd6f4;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tab-url {
      font-size: 10px;
      color: #6c7086;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Checkboxes */
    input[type="checkbox"] {
      accent-color: #89b4fa;
      flex-shrink: 0;
      cursor: pointer;
      width: 14px;
      height: 14px;
    }

    /* Footer */
    #footer {
      padding: 12px 16px;
      border-top: 1px solid #313244;
      flex-shrink: 0;
    }

    #restore-btn {
      width: 100%;
      padding: 10px;
      background: #89b4fa;
      color: #1e1e2e;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }

    #restore-btn:hover {
      background: #74c7ec;
    }

    #restore-btn:disabled {
      background: #45475a;
      color: #6c7086;
      cursor: default;
    }

    /* Scrollbar */
    #workspace-tree::-webkit-scrollbar { width: 6px; }
    #workspace-tree::-webkit-scrollbar-track { background: transparent; }
    #workspace-tree::-webkit-scrollbar-thumb { background: #45475a; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="header">
    <h1>Restore Workspace</h1>
    <button id="select-all-btn">Deselect All</button>
  </div>
  <div id="workspace-tree"></div>
  <div id="footer">
    <button id="restore-btn">Restore in current window</button>
  </div>
  <script src="workspace.js"></script>
</body>
</html>
